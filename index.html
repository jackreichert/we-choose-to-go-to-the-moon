<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A dedication to JFK's We Choose to Go to the Moon speech and humanity's journey to the Moon — past, present, and future.">
  <title>We Choose to Go to the Moon</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <!-- Styles (tokens first) -->
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/hero.css">
  <link rel="stylesheet" href="css/speech.css">
  <link rel="stylesheet" href="css/missions.css">
  <link rel="stylesheet" href="css/footer.css">
</head>
<body>

  <header id="home">
    <nav class="nav" aria-label="Main navigation">
      <a href="#home" class="nav__logo" aria-label="Go to top">We Choose to Go to the Moon</a>
      <button class="nav__hamburger" aria-expanded="false" aria-controls="nav-menu" aria-label="Toggle navigation menu">
        <span class="nav__hamburger-bar"></span>
        <span class="nav__hamburger-bar"></span>
        <span class="nav__hamburger-bar"></span>
      </button>
      <ul class="nav__menu" id="nav-menu" role="list">
        <li><a href="#speech" class="nav__link">Speech</a></li>
        <li><a href="#video" class="nav__link">Video</a></li>
        <li><a href="#missions" class="nav__link">Missions</a></li>
        <li><a href="#future" class="nav__link">Future</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section id="hero" class="hero" aria-label="Hero - JFK Moon speech dedication">
      <div class="hero__overlay" aria-hidden="true"></div>
      <div class="hero__content">
        <blockquote class="hero__quote" cite="https://www.jfklibrary.org/asset-viewer/archives/JFKPOF/040/JFKPOF-040-001">
          <p class="hero__quote-text">We choose to go to the Moon in this decade and do the other things, not because they are easy, but because they are hard.</p>
          <footer class="hero__attribution">
            <cite>President John F. Kennedy &mdash; September 12, 1962</cite>
          </footer>
        </blockquote>
        <div class="hero__scroll-cue" aria-hidden="true">
          <span class="hero__scroll-label">Scroll</span>
          <svg class="hero__scroll-arrow" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M12 5v14M5 12l7 7 7-7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
    </section>
    <section id="speech"><!-- Phase 3 --></section>
    <section id="video"><!-- Phase 3 --></section>
    <section id="missions"><!-- Phase 4 --></section>
    <section id="future"><!-- Phase 5 --></section>
  </main>

  <footer id="foot"><!-- Phase 5 --></footer>

  <script src="js/nav.js" defer></script>
  <script src="js/missions.js" defer></script>
</body>
</html>
